services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    container_name: rankpulse-postgres
    environment:
      POSTGRES_USER: rankpulse
      POSTGRES_PASSWORD: rankpulse
      POSTGRES_DB: rankpulse
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rankpulse -d rankpulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: rankpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: rankpulse-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: "3000"
      HOST: 0.0.0.0
      DATABASE_URL: postgres://rankpulse:rankpulse@postgres:5432/rankpulse
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-jwt-secret-change-me-please-min-32-chars}
      JWT_TTL_SECONDS: "86400"
      RANKPULSE_MASTER_KEY: ${RANKPULSE_MASTER_KEY:-dev-only-master-key-change-me-min-16}
      OPENAPI_ENABLED: "true"
      CORS_ORIGINS: http://localhost:5173
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: ["full"]

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: rankpulse-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://rankpulse:rankpulse@postgres:5432/rankpulse
      REDIS_URL: redis://redis:6379
      RANKPULSE_MASTER_KEY: ${RANKPULSE_MASTER_KEY:-dev-only-master-key-change-me-min-16}
      WORKER_CONCURRENCY: "4"
    profiles: ["full"]

volumes:
  pgdata:
  redisdata:
